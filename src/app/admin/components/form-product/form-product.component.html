<form [formGroup]="form" (ngSubmit)="saveProduct($event)"> <!--Agregamos el build que creamos-->
    <mat-card>
        <mat-card-header>
            <mat-card-title>Producto</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <div class="row">
                <div class="col-xs">
                    <mat-form-field>
                        <input placeholder="id" formControlName="id" matInput type="text"> <!--Form control name lo enlaza a cada dato-->  
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-xs">
                    <mat-form-field>
                        <input  placeholder="title" formControlName="title" matInput type="text"> <!--Form control name lo enlaza a cada dato-->  
                    </mat-form-field>
                </div>
            </div>
           
            <div class="row">
                <div class="col-xs">
                    <mat-form-field>
                        <input placeholder="price" formControlName="price" matInput type="number"> <!--Form control name lo enlaza a cada dato-->  
                    </mat-form-field>
                </div>
            </div>
            
            <div class="row">
                <div class="col-xs">
                    <mat-form-field>
                        <input placeholder="image" formControlName="image" matInput type="text"> <!--Form control name lo enlaza a cada dato-->  
                    </mat-form-field>
                </div>
            </div>      
            <div class="row">
                <div class="col-xs">
                    <mat-form-field>
                        <textarea placeholder="description" formControlName="description" matInput type="text"></textarea> <!--Form control name lo enlaza a cada dato-->  
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-xs">
                    <img *ngIf="(image|async) as image" [src]="image" alt="">
                  <input type="file" (change)="uploadFile($event)"><!--Apenas haya un cambio se sube el archivo-->
                </div>
            </div>
        </mat-card-content>
        <mat-card-actions>
            <button [disabled]="form.invalid" mat-raised-button type="submit">Guardar</button>
        </mat-card-actions>
    </mat-card>
   
</form>
