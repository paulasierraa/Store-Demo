<mat-horizontal-stepper>
    <mat-step>
        <ng-template matStepLabel>Sus productos</ng-template><!--TITULO-->
        <div *ngIf="(products$|async) as products"><!--SE REALIZA UNA SOLA SUSCRIPCIÓN Y EN EL IF SE CREA UNA VARIABLE DE LA SUSCRIPCIÓN-->
        <p *ngIf="products.length===0">No has seleccionado ningun producto</p>
            <div class="row" *ngFor="let product of products">
                <div class="col-xs-12 col-sm-2 col-md-2">
                <div class="box container-image">
                    <img class="image" [src]="product.image" alt="">
                </div>
                </div>
                <div class="col-xs-12 col-sm-5 col-md-5">
                <div class="box">
                    {{ product.title }}
                </div>
                </div>
                <div class="col-xs-12 col-sm-5 col-md-5">
                <div class="box">
                    {{ product.price }}
                </div>
                </div>
            </div>
        </div>
     
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Datos personales</ng-template><!--TITULO-->
        <h1>CONTENIDO</h1>
    </mat-step>
    <mat-step>
        <ng-template matStepLabel>Pago</ng-template><!--TITULO-->
        <h1>CONTENIDO</h1>

    </mat-step>
</mat-horizontal-stepper>
