<div *ngIf="(product$|async) as product"><!--CREAMOS UNA VARIABLE CUANDO SE REALICE LA PETICIÓN-->
    <div>
        <img [src]="product.image" alt="" srcset="">
    </div>
    <div>
        <ul>
            <li>Nombre: {{product.title}}</li>
            <li>Precio: {{product.price|currency}}</li>
        </ul>
        <p>{{product.description}}</p>
    </div>
    <button (click)="getFile()">Obtener archivo</button>
</div>
